config:
  service: |
    [SERVICE]
        Flush         1
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf

  inputs: |
    [INPUT]
        Name               tail
        Path               /var/log/containers/*.log
        Parser             cri
        Tag                kube.*
        Refresh_Interval   5
        Mem_Buf_Limit      50MB
        Skip_Long_Lines    On

  filters: |
    [FILTER]
        Name                 kubernetes
        Match                kube.*
        Merge_Log            On
        Merge_Log_Key        log_processed
        Keep_Log             Off
        K8S-Logging.Parser   On
        K8S-Logging.Exclude  Off

  outputs: |
    [OUTPUT]
        Name                es
        Match               kube.*
        Host                elasticsearch-master.logging.svc.cluster.local
        Port                9200
        HTTP_User           elastic
        HTTP_Passwd         00JMAtFj0huKwYuH
        tls                 On
        tls.verify          Off
        Logstash_Format     On
        Logstash_Prefix     fluent-bit
        Suppress_Type_Name  On
        Generate_ID         On
        Retry_Limit         False