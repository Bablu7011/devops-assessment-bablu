[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

########################################
# INPUT
########################################

[INPUT]
    Name              tail
    Path              /var/log/containers/*.log
    Parser            cri
    Tag               kube.*
    Refresh_Interval  5
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On

########################################
# KUBERNETES FILTER
########################################

[FILTER]
    Name                kubernetes
    Match               kube.*
    Kube_URL            https://kubernetes.default.svc:443
    Merge_Log           Off
    Keep_Log            On
    K8S-Logging.Parser  On
    K8S-Logging.Exclude Off

########################################
# JSON PARSER FILTER
########################################

[FILTER]
    Name          parser
    Match         kube.*
    Key_Name      log
    Parser        json
    Reserve_Data  On

########################################
# RECORD MODIFIER
########################################

[FILTER]
    Name   record_modifier
    Match  *
    Record cluster devops-assessment

########################################
# OUTPUT
########################################

[OUTPUT]
    Name                es
    Match               *
    Host                elasticsearch-master
    Port                9200

    tls                 On
    tls.verify          Off

    HTTP_User           elastic
    HTTP_Passwd         dAQ4Vhp5XfOnMPG8

    Logstash_Format     On
    Logstash_Prefix     fluentbit

    Generate_ID         On
    Suppress_Type_Name  On

    Retry_Limit         False