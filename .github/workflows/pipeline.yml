name: DevOps Assessment Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  ci:
    name: CI Checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/infrastructure
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform/infrastructure
        run: terraform validate

      - name: Build Backend Image
        run: docker build -t backend-test ./backend

      - name: Build Frontend Image
        run: docker build -t frontend-test ./frontend

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: helm lint helm/assessment-app

      - name: Helm Template Validation
        run: helm template assessment-app helm/assessment-app

      - name: Upload Helm Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: helm/assessment-app

  cd:
    name: CD Deployment
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/infrastructure
        run: |
          terraform init \
            -backend-config="../environments/dev/backend.hcl"

      - name: Terraform Plan
        working-directory: terraform/infrastructure
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/infrastructure
        run: |
          terraform apply -auto-approve tfplan

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate Image Tag
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Backend Image
        run: |
          docker build \
            -t ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:backend-${{ steps.tag.outputs.tag }} \
            ./backend

      - name: Build Frontend Image
        run: |
          docker build \
            -t ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:frontend-${{ steps.tag.outputs.tag }} \
            ./frontend

      - name: Push Backend Image
        run: |
          docker push \
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:backend-${{ steps.tag.outputs.tag }}

      - name: Push Frontend Image
        run: |
          docker push \
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:frontend-${{ steps.tag.outputs.tag }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy Application
        run: |
          helm upgrade --install assessment-app ./helm/assessment-app \
            --namespace assessment \
            --create-namespace \
            --set backend.image.repository=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }} \
            --set backend.image.tag=backend-${{ steps.tag.outputs.tag }} \
            --set frontend.image.repository=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }} \
            --set frontend.image.tag=frontend-${{ steps.tag.outputs.tag }}

      - name: Verify Backend Rollout
        run: kubectl rollout status deployment/backend -n assessment --timeout=300s

      - name: Verify Frontend Rollout
        run: kubectl rollout status deployment/frontend -n assessment --timeout=300s

      - name: Smoke Test API
        run: |
          curl -f http://sparkintern.in || exit 1