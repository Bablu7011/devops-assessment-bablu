name: DevOps Assessment Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  ci:
    name: CI Checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Terraform Validation
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      # Docker Build Test
      - name: Build Backend Image
        run: docker build -t backend-test ./backend

      - name: Build Frontend Image
        run: docker build -t frontend-test ./frontend

      # Kubernetes Lint
      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: helm lint helm/assessment-app

      - name: Helm Template Validation
        run: helm template assessment-app helm/assessment-app

      # Upload Artifacts
      - name: Upload Helm Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: helm/assessment-app

  cd:
    name: CD Deployment
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # AWS Authentication
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Terraform Plan & Apply
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Generate Image Tag
      - name: Generate Image Tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # Build Docker Images
      - name: Build Docker Images
        run: |
          docker build \
          -t ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:backend-${{ env.IMAGE_TAG }} \
          ./backend
          
          docker build \
          -t ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:frontend-${{ env.IMAGE_TAG }} \
          ./frontend

      # Push Images
      - name: Push Docker Images
        run: |
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:backend-${{ env.IMAGE_TAG }}
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:frontend-${{ env.IMAGE_TAG }}

      # Configure kubectl
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      # Deploy to Kubernetes
      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy Application
        run: |
          helm upgrade --install assessment-app ./helm/assessment-app \
            --namespace assessment \
            --create-namespace \
            --set backend.image.tag=backend-${{ env.IMAGE_TAG }} \
            --set frontend.image.tag=frontend-${{ env.IMAGE_TAG }}

      # Rollout Verification
      - name: Verify Backend Rollout
        run: kubectl rollout status deployment/backend -n assessment

      - name: Verify Frontend Rollout
        run: kubectl rollout status deployment/frontend -n assessment

      # Smoke Test API
      - name: Smoke Test API
        run: |
          curl -f http://sparkintern.in || exit 1